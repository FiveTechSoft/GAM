name: compile-paper
on: workflow_dispatch
permissions:
  contents: write
jobs:
  compile:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install tectonic
        run: |
          curl -fsSL https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-gnu.tar.gz | tar xzf - -C /usr/local/bin
      - name: Compile
        run: tectonic -X compile paper.tex
      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f paper.pdf
          git commit -m "Add compiled paper.pdf [skip ci]" || true
          git push
